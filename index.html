<!DOCTYPE html>
<html>
<head>
    <title>LIMRA TRAVELS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font Awesome for WhatsApp Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f2f2f2;
        }

        header {
            background: linear-gradient(90deg, #001f3f, #003366);
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #111;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00c3ff;
        }

        /* Slider */
        .slider {
            position: relative;
            max-width: 100%;
            height: 350px;
            overflow: hidden;
        }

        .slides {
            display: flex;
            width: 300%;
            animation: slide 12s infinite;
        }

        .slides img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        @keyframes slide {
            0% {margin-left: 0;}
            33% {margin-left: 0;}
            38% {margin-left: -100%;}
            66% {margin-left: -100%;}
            71% {margin-left: -200%;}
            100% {margin-left: -200%;}
        }

        .content {
            text-align: center;
            padding: 50px 20px;
            background: white;
        }

        .content h1 {
            color: #003366;
        }

        .btn {
            padding: 12px 25px;
            background: #003366;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0059b3;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* WhatsApp Button */
        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            font-size: 28px;
            padding: 15px;
            border-radius: 50%;
            text-align: center;
            box-shadow: 0 0 10px gray;
            z-index: 1000;
        }

        .whatsapp:hover {
            background: #1ebc57;
        }

        @media(max-width:768px){
            .slider, .slides img {
                height: 220px;
            }
        }
    </style>
</head>

<body>

<header>

<nav>

        <img src="https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d" alt="Documents">
